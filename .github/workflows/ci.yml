name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - run: go vet ./...
      - run: go build ./cmd/dandori
      - run: go test -v -race -count=1 ./...
      - name: Verify adapter/grpc does not import engine
        run: |
          if go list -f '{{ join .Imports "\n" }}' ./internal/adapter/grpc/ | grep -q 'engine'; then
            echo "ERROR: adapter/grpc/ imports engine/"
            exit 1
          fi
